name: Visual Regression Test

on:
  pull_request:
    branches: [main]

jobs:
  vrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 1. Typst ビルド（スライド PDF が必要）
      - uses: typst-community/setup-typst@v4

      - name: Compile Typst slides
        run: |
          mkdir -p public/slides
          for f in typst/*.typ; do
            [ -f "$f" ] || continue
            typst compile --font-path typst/fonts "$f" \
              "public/slides/$(basename "${f%.typ}").pdf"
          done

      # 2. Node.js セットアップ
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 3. OG 画像生成（astro dev のビルドに必要）
      - name: Generate OG images
        run: npm run og:build

      # 4. Playwright Chromium インストール
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 5. VRT 実行
      - name: Run VRT
        run: npm run test:vrt
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ZENN_USERNAME: ${{ vars.ZENN_USERNAME || 'ahoxa1rx' }}
          QIITA_USERNAME: ${{ vars.QIITA_USERNAME || 'raiga0310' }}
