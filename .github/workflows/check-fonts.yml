name: Check Typst Fonts

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-fonts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: typst-community/setup-typst@v4

      - name: Check for missing fonts (compile-based)
        run: |
          tmpdir=$(mktemp -d)
          failed=0

          compile_check() {
            local label="$1"; shift
            local log="$tmpdir/${label}.log"
            typst compile --font-path typst/fonts "$@" 2>"$log" || true
            local warnings
            warnings=$(grep "warning: unknown font family" "$log" || true)
            if [ -n "$warnings" ]; then
              echo "[NG] $label"
              echo "$warnings" | sed 's/^/       /'
              echo "$warnings" | while IFS= read -r line; do
                echo "::error file=typst/${label}::$line"
              done
              failed=1
            else
              echo "[OK] $label"
            fi
          }

          # og_images: sys.inputs が必要なものはダミー値を渡す
          compile_check "og_images/og-page.typ" \
            --input title="Font Check" --input description="" --input kind="Test" \
            --format png "typst/og_images/og-page.typ" "$tmpdir/og-page.png"

          compile_check "og_images/og.typ" \
            --format png "typst/og_images/og.typ" "$tmpdir/og.png"

          # typst/ 直下の .typ ファイル（スライド等）
          for f in typst/*.typ; do
            [ -f "$f" ] || continue
            label="$(basename "$f")"
            compile_check "$label" "$f" "$tmpdir/${label%.typ}.pdf"
          done

          echo ""
          if [ $failed -ne 0 ]; then
            echo "::error::Missing fonts detected. Add the TTF/OTF to typst/fonts/ and verify"
            echo "::error::the embedded family name with: python3 scripts/check-font-name.py <file>"
            exit 1
          fi

          echo "All font checks passed."
